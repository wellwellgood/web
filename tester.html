<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 회전</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="center-element">
        <div class="rotating-image">
            <img src="dlalwl/2610001_6328-removebg-preview.png" alt="회전 이미지">
        </div>
    </div>
</body>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
}

.center-element {
    width: 100px;
    height: 100px;
    position: relative;
    border: 3px solid #333;
    border-radius: 50%;
}

.rotating-image {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 50px;
    height: 50px;
    transform-origin: -100px;
    animation: rotate 5s linear infinite;
}

.rotating-image img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

@keyframes rotate {
    from {
        transform: rotate(0deg) translateX(-100px);
    }
    to {
        transform: rotate(360deg) translateX(-100px);
    }
}
</style>
</html>
